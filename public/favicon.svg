<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Tipping Point</title>
  <!-- Sky (rounded square so it reads as an app icon too) -->
  <rect x="0" y="0" width="32" height="32" rx="5" ry="5" fill="#5cb3d6"/>

  <!-- Globe body: ocean disc with pixel outline -->
  <g>
    <!-- Outline (dark eggplant) -->
    <rect x="11" y="13" width="10" height="1" fill="#1a1328"/>
    <rect x="9" y="14" width="2" height="1" fill="#1a1328"/><rect x="21" y="14" width="2" height="1" fill="#1a1328"/>
    <rect x="8" y="15" width="1" height="1" fill="#1a1328"/><rect x="23" y="15" width="1" height="1" fill="#1a1328"/>
    <rect x="7" y="16" width="1" height="2" fill="#1a1328"/><rect x="24" y="16" width="1" height="2" fill="#1a1328"/>
    <rect x="6" y="18" width="1" height="3" fill="#1a1328"/><rect x="25" y="18" width="1" height="3" fill="#1a1328"/>
    <rect x="7" y="21" width="1" height="2" fill="#1a1328"/><rect x="24" y="21" width="1" height="2" fill="#1a1328"/>
    <rect x="8" y="23" width="1" height="1" fill="#1a1328"/><rect x="23" y="23" width="1" height="1" fill="#1a1328"/>
    <rect x="9" y="24" width="2" height="1" fill="#1a1328"/><rect x="21" y="24" width="2" height="1" fill="#1a1328"/>
    <rect x="11" y="25" width="10" height="1" fill="#1a1328"/>

    <!-- Ocean fill -->
    <rect x="11" y="14" width="10" height="1" fill="#3aa0d4"/>
    <rect x="9" y="15" width="14" height="1" fill="#3aa0d4"/>
    <rect x="8" y="16" width="16" height="2" fill="#3aa0d4"/>
    <rect x="7" y="18" width="18" height="3" fill="#3aa0d4"/>
    <rect x="8" y="21" width="16" height="2" fill="#3aa0d4"/>
    <rect x="9" y="23" width="14" height="1" fill="#3aa0d4"/>
    <rect x="11" y="24" width="10" height="1" fill="#3aa0d4"/>

    <!-- Ocean highlight (top-left) -->
    <rect x="11" y="15" width="2" height="1" fill="#7cc9e8"/>
    <rect x="9" y="16" width="2" height="1" fill="#7cc9e8"/>
    <rect x="8" y="17" width="1" height="1" fill="#7cc9e8"/>

    <!-- Continents (small green landmasses) -->
    <!-- West landmass -->
    <rect x="10" y="17" width="3" height="1" fill="#6cc04a"/>
    <rect x="9" y="18" width="5" height="1" fill="#6cc04a"/>
    <rect x="10" y="19" width="3" height="1" fill="#6cc04a"/>
    <rect x="11" y="20" width="2" height="1" fill="#6cc04a"/>
    <!-- East landmass -->
    <rect x="16" y="18" width="3" height="1" fill="#6cc04a"/>
    <rect x="15" y="19" width="5" height="1" fill="#6cc04a"/>
    <rect x="16" y="20" width="4" height="1" fill="#6cc04a"/>
    <rect x="18" y="21" width="3" height="1" fill="#6cc04a"/>
    <!-- Southern tip -->
    <rect x="13" y="22" width="3" height="1" fill="#6cc04a"/>
  </g>

  <!-- Leaf sprouting above the globe -->
  <g>
    <!-- Stem (dark) -->
    <rect x="15" y="11" width="1" height="3" fill="#1a1328"/>
    <!-- Leaf outline -->
    <rect x="14" y="3" width="3" height="1" fill="#1a1328"/>
    <rect x="12" y="4" width="2" height="1" fill="#1a1328"/><rect x="17" y="4" width="2" height="1" fill="#1a1328"/>
    <rect x="11" y="5" width="1" height="1" fill="#1a1328"/><rect x="19" y="5" width="1" height="1" fill="#1a1328"/>
    <rect x="10" y="6" width="1" height="2" fill="#1a1328"/><rect x="20" y="6" width="1" height="2" fill="#1a1328"/>
    <rect x="11" y="8" width="1" height="1" fill="#1a1328"/><rect x="19" y="8" width="1" height="1" fill="#1a1328"/>
    <rect x="12" y="9" width="1" height="1" fill="#1a1328"/><rect x="18" y="9" width="1" height="1" fill="#1a1328"/>
    <rect x="13" y="10" width="2" height="1" fill="#1a1328"/><rect x="16" y="10" width="2" height="1" fill="#1a1328"/>

    <!-- Leaf fill (green) -->
    <rect x="14" y="4" width="3" height="1" fill="#6cc04a"/>
    <rect x="12" y="5" width="7" height="1" fill="#6cc04a"/>
    <rect x="11" y="6" width="9" height="2" fill="#6cc04a"/>
    <rect x="12" y="8" width="7" height="1" fill="#6cc04a"/>
    <rect x="13" y="9" width="5" height="1" fill="#6cc04a"/>
    <rect x="15" y="10" width="1" height="1" fill="#6cc04a"/>

    <!-- Leaf highlight -->
    <rect x="13" y="5" width="2" height="1" fill="#a8e26b"/>
    <rect x="12" y="6" width="2" height="1" fill="#a8e26b"/>

    <!-- Midrib (darker vein) -->
    <rect x="15" y="5" width="1" height="5" fill="#3f8a2d"/>
  </g>
</svg>
