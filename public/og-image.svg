<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 630" width="1200" height="630"
     shape-rendering="crispEdges">
  <title>Tipping Point — A climate strategy game</title>
  <desc>Pixel-art split landscape: a scenic green world on the left, a burning
  wasteland on the right. The TIPPING POINT wordmark sits across the divide, and
  a tagline card reads "Spread the solutions. Save the planet. Research, deploy,
  reverse the curve."</desc>

  <defs>
    <!-- Soft bottom vignette so the tagline card reads against the landscape -->
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.54" stop-color="#0a0814" stop-opacity="0"/>
      <stop offset="1"    stop-color="#0a0814" stop-opacity="0.43"/>
    </linearGradient>
  </defs>

  <!-- Solid fallback in case the wallpaper fails to render -->
  <rect width="1200" height="630" fill="#1a1328"/>

  <!-- Painted wallpaper, scaled to h=630 and centered (native ratio 1819.5:780) -->
  <image href="title-wallpaper.svg" xlink:href="title-wallpaper.svg"
         x="-135" y="0" width="1470" height="630"
         preserveAspectRatio="xMidYMid slice"/>

  <!-- Bottom vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Wordmark logo, sized to 600×327 and centered horizontally -->
  <g>
    <!-- Soft drop shadow approximated with a slightly offset, blurred copy -->
    <image href="tipping-point-logo.svg" xlink:href="tipping-point-logo.svg"
           x="300" y="56" width="600" height="327"
           opacity="0.35" filter="blur(10px)"/>
    <image href="tipping-point-logo.svg" xlink:href="tipping-point-logo.svg"
           x="300" y="52" width="600" height="327"/>
  </g>

  <!-- Tagline card -->
  <g>
    <rect x="170" y="432" width="860" height="132" fill="#1a1328"/>
    <rect x="175" y="437" width="850" height="122" fill="#f4efdf"/>
    <rect x="187" y="449" width="826" height="12"  fill="#e8dfc4"/>
    <!-- Pixel-art corner accents -->
    <rect x="170" y="432" width="5" height="5" fill="#1a1328"/>
    <rect x="1025" y="432" width="5" height="5" fill="#1a1328"/>
    <rect x="170" y="559" width="5" height="5" fill="#1a1328"/>
    <rect x="1025" y="559" width="5" height="5" fill="#1a1328"/>

    <text x="600" y="502"
          font-family="'Arial Black', 'Helvetica Neue', system-ui, sans-serif"
          font-size="36" font-weight="900" text-anchor="middle" fill="#1a1328">
      Spread the solutions. Save the planet.
    </text>
    <text x="600" y="540"
          font-family="'Arial', 'Helvetica Neue', system-ui, sans-serif"
          font-size="24" text-anchor="middle" fill="#1a1328">
      Research, deploy, reverse the curve.
    </text>
  </g>
</svg>
