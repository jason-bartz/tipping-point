<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Tipping Point — A Climate Strategy Game</title>
<meta name="description" content="Race to decarbonize the planet before +4°C. A free browser-based strategy game: pick a country, research 47 climate solutions across 6 branches, and reverse the curve." />
<meta name="keywords" content="climate change game, decarbonize, strategy game, climate strategy, CO2 game, browser game, free game, educational game, Tipping Point game" />
<meta name="author" content="Jason Bartz" />
<meta name="robots" content="index, follow, max-image-preview:large" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#5cb3d6" />

<link rel="canonical" href="https://playtippingpoint.com/" />

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

<link rel="manifest" href="/site.webmanifest" />

<!-- Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Tipping Point" />
<meta property="og:title" content="Tipping Point — A Climate Strategy Game" />
<meta property="og:description" content="Race to decarbonize the planet before +4°C. Pick a country, research 47 climate solutions across 6 branches, and reverse the curve." />

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Tipping Point — A Climate Strategy Game" />

<meta name="twitter:image" content="https://playtippingpoint.com/og-image.png" />

<!-- Structured data: VideoGame -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoGame",
  "name": "Tipping Point",
  "alternateName": "Tipping Point: Climate Strategy",
  "url": "https://playtippingpoint.com/",
  "image": "https://playtippingpoint.com/og-image.png",
  "description": "A browser-based climate strategy game. Pick a country and race to decarbonize the planet before temperature crosses +4°C. Research 47 climate solutions across six branches and spread them to neighboring countries.",
  "applicationCategory": "Game",
  "genre": ["Strategy", "Simulation", "Educational"],
  "gamePlatform": ["Web Browser"],
  "operatingSystem": "Any",
  "playMode": "SinglePlayer",
  "inLanguage": "en",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD",
    "availability": "https://schema.org/InStock"
  },
  "author": {
    "@type": "Person",
    "name": "Jason Bartz"
  }
}
</script>
</head>
<body>

<noscript>
  <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f1820;color:#e6eef2;font-family:system-ui,sans-serif;padding:2rem;text-align:center;z-index:9999;">
    <div style="max-width:520px;">
      <h1 style="margin:0 0 0.5em;font-size:1.5rem;">Tipping Point needs JavaScript</h1>
      <p style="margin:0;line-height:1.5;opacity:0.85;">This is a browser-based strategy game built on JavaScript. Enable it in your browser settings to play.</p>
    </div>
  </div>
</noscript>

<!-- COUNTRY SELECT SCREEN -->
<div class="screen active" id="country-screen">
  <div class="title-card wide" id="title-root">
    <!-- rendered by CountrySelect.js -->
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="hud" id="hud-root"></div>
  <div id="news-bar"></div>
  <div id="left-panel"></div>
  <div id="map-container"><div class="loading">Loading world map…</div></div>
  <div id="right-panel"></div>
  <div id="status-bar">
    <span title="Global emissions in gigatons of CO₂ per year. ~40 Gt today. Falls as countries adopt clean activities.">Emissions: <span class="emissions" id="emissions-val">40.0 GtCO₂/yr</span></span>
    <span id="reversal-indicator" title="Win condition tracker. CO₂ must peak, then drop at least 8 ppm below its peak while the world decarbonizes. Hit that + temp ceiling + Net Zero % and you win.">Peak CO₂: — · Drop: —</span>
    <span class="hud-spacer" style="flex:1"></span>
    <span id="research-summary" title="Activities you've unlocked. Research in the left panel; deploy to countries in the right panel.">Researched: 0</span>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen" id="end-screen"><div class="end-card" id="end-card"></div></div>

<!-- Mobile drawer toggles (left = Research/Advisors, right = Country/Decisions).
     Hidden on desktop via CSS; rendered for all devices so touch-landscape users
     see them without needing JS feature detection. -->
<button id="mobile-toggle-left"  class="mobile-fab mobile-fab-left"  type="button" aria-label="Open research and advisors panel">☰ Research</button>
<button id="mobile-toggle-right" class="mobile-fab mobile-fab-right" type="button" aria-label="Open country and decisions panel">Country ☰</button>

<!-- Backdrop for mobile drawers. Click to close. -->
<div id="mobile-drawer-backdrop" aria-hidden="true"></div>

<!-- Portrait-orientation block on touch devices. Landscape only, force on mobile. -->
<div id="rotate-overlay" role="dialog" aria-modal="true" aria-labelledby="rotate-title">
  <div class="rotate-card">
    <div class="rotate-icon" aria-hidden="true">↻</div>
    <h2 id="rotate-title">Rotate your device</h2>
    <p>Tipping Point is designed for landscape. Turn your phone sideways to play.</p>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
